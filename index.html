<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gerenciador de Tarefas</title>
</head>
<body>

    <div class="container">
        
        <header class="cabecalho">
            <h1>Gerenciador de Tarefas</h1>
            <p> Organize seus prazos acadêmicos</p>
        </header>

        <div class="caixa-formulario">
            <h2>Adicionar Tarefa</h2>
            <form>
                <div class="campo">
                    <label for="disciplina">Disciplina:</label>
                    <input type="text" id="disciplina" placeholder="Ex: Matemática">
                </div>

                <div class="campo">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" placeholder="Ex: Estudar para prova">
                </div>

                <div class="campo">
                    <label for="prazo">Prazo de Entrega:</label>
                    <input type="date" id="prazo">
                </div>

                <button type="button" class="btn-salvar">Adicionar Tarefa</button>
            </form>
        </div>

        <div class="caixa-tarefas">
            <h2>Minhas Tarefas</h2>

            <div class="card-tarefa">
                <div class="info-tarefa">
                    <h3>Lista de POO</h3>
                    <span class="tag-disciplina">Programação</span>
                    <p>Prazo de Entrega: <strong>18/05/2026</strong></p>
                </div>
                <button type="button" class="btn-concluir">Concluir</button>
            </div>

            <div class="card-tarefa">
                <div class="info-tarefa">
                    <h3>Trabalho de Redação</h3>
                    <span class="tag-disciplina">Português</span>
                    <p>Prazo: <strong>20/06/2026</strong></p>
                </div>
                <button type="button" class="btn-concluir">Concluir</button>
            </div>

        </div>

    </div>

</body>
</html>
